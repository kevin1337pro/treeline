<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Treeline – Baumdienst Enbergs</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; }
    body { background: #f8f7f4; color: #1a1a18; }
    #root { height: 100%; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #bbb; }
    button, input, select, textarea { font-family: inherit; }
    .leaflet-container { font-family: inherit; }

    /* Mobile responsive */
    @media (max-width: 768px) {
      .sidebar-desktop {
        transform: translateX(-100%);
        box-shadow: 12px 0 30px rgba(0,0,0,0.14);
      }
      .sidebar-desktop.sidebar-open { transform: translateX(0); }
      .sidebar-desktop.sidebar-collapsed { transform: translateX(-100%); }
      .main-content { margin-left: 0 !important; }
      .stat-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .row3 { grid-template-columns: 1fr !important; }
      .two-col { grid-template-columns: 1fr !important; }
      .meta-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .kanban { grid-template-columns: 1fr !important; }
    }
  </style>
</head>

  <div id="root"></div>

  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
