<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Treeline – Baumdienst Enbergs</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.24.0/mapbox-gl.css" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; }
    body { background: #f8f7f4; color: #1a1a18; }
    #root { height: 100%; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #bbb; }
    button, input, select, textarea { font-family: inherit; }
    .mapboxgl-map { font-family: inherit; }
    .mobile-label { display: none; }

    /* Mobile responsive */
    @media (max-width: 768px) {
      html, body, #root {
        width: 100% !important;
        max-width: 100% !important;
        overflow-x: hidden !important;
      }
      .sidebar-desktop {
        top: 52px !important;
        height: calc(100vh - 52px) !important;
        transform: translateX(-100%);
        box-shadow: 12px 0 30px rgba(0,0,0,0.14);
      }
      .sidebar-desktop.sidebar-open { transform: translateX(0); }
      .sidebar-desktop.sidebar-collapsed { transform: translateX(-100%); }
      .main-content {
        margin-left: 0 !important;
        width: 100% !important;
        max-width: 100vw !important;
        overflow-x: hidden !important;
      }
      .stat-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
        width: 100% !important;
        max-width: 100% !important;
      }
      .stat-grid > * {
        min-width: 0 !important;
      }
      .row3 { grid-template-columns: 1fr !important; }
      .two-col { grid-template-columns: 1fr !important; }
      .meta-grid { grid-template-columns: repeat(2, 1fr) !important; }
      .kanban { grid-template-columns: 1fr !important; }
      .dashboard-page {
        padding: 20px 14px 28px !important;
        max-width: 100vw !important;
        overflow-x: hidden !important;
      }
      .dashboard-page svg {
        max-width: 100% !important;
      }
      .table-scroll {
        overflow-x: auto !important;
        -webkit-overflow-scrolling: touch;
      }
      .table-scroll table {
        min-width: 720px !important;
      }
      .app-top-bar {
        padding: 0 10px !important;
      }
      .app-top-right {
        gap: 6px !important;
      }
      .global-search {
        display: none !important;
      }
      .desktop-label {
        display: none !important;
      }
      .mobile-label {
        display: inline !important;
      }
      .orders-shell {
        height: auto !important;
        min-height: 100% !important;
        overflow: visible !important;
        flex-direction: column !important;
        max-width: 100vw !important;
      }
      .orders-list {
        width: 100% !important;
        min-width: 0 !important;
        max-width: 100% !important;
        height: auto !important;
        max-height: 42vh !important;
        border-right: none !important;
        border-bottom: 1px solid #e5e5e0 !important;
      }
      .orders-detail {
        padding: 16px !important;
        overflow: visible !important;
        min-width: 0 !important;
        max-width: 100vw !important;
      }
      .orders-detail > * {
        min-width: 0 !important;
      }
      .orders-detail h1 {
        font-size: 22px !important;
      }
      .map-shell {
        height: calc(100vh - 52px) !important;
        max-width: 100vw !important;
        overflow: hidden !important;
      }
      .map-toolbar {
        display: grid !important;
        grid-template-columns: minmax(0, 1fr) !important;
        gap: 8px !important;
        padding: 8px !important;
        max-height: none !important;
        overflow: hidden !important;
        align-items: stretch !important;
      }
      .map-toolbar select,
      .map-toolbar form {
        min-width: 0 !important;
        width: 100% !important;
        flex-basis: 100% !important;
      }
      .map-toolbar > span {
        display: none !important;
      }
      .map-place-search {
        display: grid !important;
        grid-template-columns: auto minmax(0, 1fr) auto !important;
        align-items: center !important;
      }
      .map-place-search input {
        min-width: 0 !important;
      }
      .map-place-status {
        display: none !important;
      }
      .map-filters,
      .map-view-actions {
        width: 100% !important;
        max-width: 100% !important;
        display: flex !important;
        flex-wrap: nowrap !important;
        overflow-x: auto !important;
        overflow-y: hidden !important;
        -webkit-overflow-scrolling: touch;
        padding-bottom: 2px !important;
      }
      .map-filters button,
      .map-style-switch,
      .map-mode-btn,
      .map-focus-btn {
        flex: 0 0 auto !important;
      }
      .map-body {
        flex-direction: column !important;
        min-height: 0 !important;
      }
      .map-canvas {
        min-height: 0 !important;
        height: 100% !important;
        flex: 1 1 auto !important;
      }
      .map-tool-panel {
        left: 8px !important;
        right: 8px !important;
        top: auto !important;
        bottom: 10px !important;
        width: auto !important;
        max-width: none !important;
        padding: 10px !important;
        z-index: 10 !important;
      }
      .map-tool-panel-collapsed .map-tool-body {
        display: none !important;
      }
      .map-tool-panel-open {
        max-height: min(52vh, 360px) !important;
        overflow-y: auto !important;
      }
      .map-side-panel {
        width: 100% !important;
        max-height: 38vh !important;
        border-left: none !important;
        border-top: 1px solid #e5e5e0 !important;
      }
    }
  </style>
</head>
<body>

  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.24.0/mapbox-gl.js"></script>

</body>
</html>
